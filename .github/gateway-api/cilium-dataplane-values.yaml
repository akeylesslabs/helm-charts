globalConfig:
  gatewayAuth:
    gatewayAccessType: access_key
    gatewayCredentialsExistingSecret: akeyless-auth

gateway:
  service:
    type: ClusterIP

sra:
  sshConfig:
    service:
      type: ClusterIP

gatewayAPI:
  enabled: true
  gateway:
    create: true
    gatewayClassName: cilium
  backend:
    ports:
      - {name: gateway, port: 8000}
      - {name: kmip, port: 5696}
      - {name: hvp, port: 8200}
      - {name: ssh, port: 22}
      - {name: echo, port: 8080}
  httpRoutes:
    - hostname: echo.dataplane.test
      backendRefs:
        - {servicePort: echo, serviceName: gwapi-echo}
  extraObjects:
    - apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: gwapi-echo
        namespace: "{{ .Release.Namespace }}"
        labels:
          app: gwapi-echo
      spec:
        replicas: 1
        selector:
          matchLabels:
            app: gwapi-echo
        template:
          metadata:
            labels:
              app: gwapi-echo
          spec:
            containers:
              - name: echo
                image: hashicorp/http-echo:1.0.0
                args:
                  - -listen=:8080
                  - -text=akeyless-gateway-api-dataplane-ok
                ports:
                  - name: echo
                    containerPort: 8080
                readinessProbe:
                  tcpSocket:
                    port: 8080
                  initialDelaySeconds: 2
                  periodSeconds: 5
    - apiVersion: v1
      kind: Service
      metadata:
        name: gwapi-echo
        namespace: "{{ .Release.Namespace }}"
        labels:
          app: gwapi-echo
      spec:
        selector:
          app: gwapi-echo
        ports:
          - {name: echo, port: 8080, targetPort: echo}

apiVersion: apps/v1
kind: Deployment
metadata:
  name: gwapi-echo
  labels:
    app: gwapi-echo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gwapi-echo
  template:
    metadata:
      labels:
        app: gwapi-echo
    spec:
      containers:
        - name: echo
          image: hashicorp/http-echo:1.0.0
          args:
            - -listen=:8080
            - -text=akeyless-gateway-api-dataplane-ok
          ports:
            - name: echo
              containerPort: 8080
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: gwapi-echo
  labels:
    app: gwapi-echo
spec:
  selector:
    app: gwapi-echo
  ports:
    - name: echo
      port: 8080
      targetPort: echo

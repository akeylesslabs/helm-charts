name: Setup Gateway API controller
description: Install the Gateway API CRDs and a Gateway API controller on a kind cluster

inputs:
  controller:
    description: Gateway API controller to install
    required: false
    default: cilium
  gateway-api-version:
    description: Gateway API release tag for the CRDs
    required: false
    default: v1.4.1
  cilium-version:
    description: Cilium chart version
    required: false
    default: 1.19.5
  dataplane:
    description: Enable L2 announcements and an in-subnet LoadBalancer pool so the Gateway IP is reachable
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - name: Install Gateway API CRDs
      shell: bash
      env:
        GATEWAY_API_VERSION: ${{ inputs.gateway-api-version }}
      run: |
        base="https://raw.githubusercontent.com/kubernetes-sigs/gateway-api/${GATEWAY_API_VERSION}/config/crd"
        kubectl apply -f "${base}/standard/gateway.networking.k8s.io_gatewayclasses.yaml"
        kubectl apply -f "${base}/standard/gateway.networking.k8s.io_gateways.yaml"
        kubectl apply -f "${base}/standard/gateway.networking.k8s.io_httproutes.yaml"
        kubectl apply -f "${base}/standard/gateway.networking.k8s.io_referencegrants.yaml"
        kubectl apply -f "${base}/standard/gateway.networking.k8s.io_grpcroutes.yaml"
        kubectl apply -f "${base}/experimental/gateway.networking.k8s.io_tlsroutes.yaml"

    - name: Install Cilium controller
      if: inputs.controller == 'cilium'
      shell: bash
      env:
        CILIUM_VERSION: ${{ inputs.cilium-version }}
        DATAPLANE: ${{ inputs.dataplane }}
      run: |
        helm repo add cilium https://helm.cilium.io/
        helm repo update
        control_plane_ip=$(kubectl get nodes -l node-role.kubernetes.io/control-plane -o jsonpath='{.items[0].status.addresses[?(@.type=="InternalIP")].address}')
        extra=()
        if [ "$DATAPLANE" = "true" ]; then
          extra+=(--set l2announcements.enabled=true --set k8sClientRateLimit.qps=10 --set k8sClientRateLimit.burst=20)
        fi
        helm install cilium cilium/cilium \
          --namespace kube-system \
          --version "${CILIUM_VERSION}" \
          --set kubeProxyReplacement=true \
          --set k8sServiceHost="${control_plane_ip}" \
          --set k8sServicePort=6443 \
          --set gatewayAPI.enabled=true \
          --set operator.replicas=1 \
          "${extra[@]}" \
          --wait \
          --timeout 300s

    - name: Wait for Cilium rollout
      if: inputs.controller == 'cilium'
      shell: bash
      run: |
        kubectl -n kube-system rollout status daemonset/cilium --timeout=300s
        kubectl -n kube-system rollout status deployment/cilium-operator --timeout=300s

    - name: Configure Cilium LoadBalancer IPAM
      if: inputs.controller == 'cilium'
      shell: bash
      env:
        DATAPLANE: ${{ inputs.dataplane }}
      run: |
        block=192.0.2.0/24
        if [ "$DATAPLANE" = "true" ]; then
          subnet=$(docker network inspect kind -f '{{range .IPAM.Config}}{{.Subnet}} {{end}}' | tr ' ' '\n' | grep -E '^[0-9]+\.' | head -1)
          net=${subnet%/*}
          o1=${net%%.*}
          rest=${net#*.}
          o2=${rest%%.*}
          block="${o1}.${o2}.255.0/24"
          echo "loadbalancer pool derived from kind subnet ${subnet} -> ${block}"
        fi
        cat <<EOF | kubectl apply -f -
        apiVersion: cilium.io/v2
        kind: CiliumLoadBalancerIPPool
        metadata:
          name: gateway-api-test
        spec:
          blocks:
            - cidr: ${block}
        EOF

    - name: Configure Cilium L2 announcements
      if: inputs.controller == 'cilium' && inputs.dataplane == 'true'
      shell: bash
      run: |
        kubectl wait --for=condition=established --timeout=60s crd/ciliuml2announcementpolicies.cilium.io
        cat <<'EOF' | kubectl apply -f -
        apiVersion: cilium.io/v2alpha1
        kind: CiliumL2AnnouncementPolicy
        metadata:
          name: gateway-api-test
        spec:
          loadBalancerIPs: true
          externalIPs: true
          interfaces:
            - ^eth[0-9]+
        EOF

    - name: Wait for cilium GatewayClass Accepted
      if: inputs.controller == 'cilium'
      shell: bash
      run: |
        kubectl wait --for=condition=Accepted gatewayclass/cilium --timeout=180s

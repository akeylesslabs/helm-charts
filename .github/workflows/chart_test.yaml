name: Chart Test

on:
  pull_request:
    paths:
      - "charts/**"
      - ".github/chart-fixtures/**"
      - ".github/ct.yaml"
      - ".github/workflows/chart_test.yaml"

jobs:
  chart-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.x"

      - name: Set up chart-testing
        uses: helm/chart-testing-action@6ec842c01de15ebb84c8627d2744a0c2f2755c9f # v2

      - name: Run chart-testing list-changed
        id: list-changed
        run: |
          changed="$(ct list-changed --config .github/ct.yaml)"
          if [[ -n "$changed" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            {
              echo "changed-charts<<EOF"
              echo "$changed"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Add dependency chart repos
        if: steps.list-changed.outputs.changed == 'true'
        run: |
          helm repo add dandydeveloper https://dandydeveloper.github.io/charts/
          helm repo update

      - name: Run chart-testing lint
        if: steps.list-changed.outputs.changed == 'true'
        run: ct lint --config .github/ct.yaml

      - name: Create kind cluster
        if: steps.list-changed.outputs.changed == 'true'
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1

      - name: Prepare test environment
        if: steps.list-changed.outputs.changed == 'true'
        env:
          CHANGED_CHARTS: ${{ steps.list-changed.outputs.changed-charts }}
        run: |
          kubectl create namespace chart-testing --dry-run=client -o yaml | kubectl apply -f -
          while IFS= read -r chart; do
            chart_name=$(basename "$chart")
            fixture_dir=".github/chart-fixtures/${chart_name}"
            if [[ -d "$fixture_dir" ]]; then
              kubectl apply -f "$fixture_dir/" -n chart-testing
            fi
          done <<< "$CHANGED_CHARTS"

      - name: Run chart-testing install
        if: steps.list-changed.outputs.changed == 'true'
        run: ct install --config .github/ct.yaml

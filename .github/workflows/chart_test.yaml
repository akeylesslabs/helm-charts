name: Chart Test

on:
  pull_request:
    paths:
      - "charts/**"
      - ".github/chart-fixtures/**"
      - ".github/ct.yaml"
      - ".github/workflows/chart_test.yaml"

jobs:
  chart-test:
    # ubuntu-latest currently resolves to ubuntu-24.04, where kind/gateway
    # installs hit a runner-kernel-specific rsyslog permission failure.
    # Keep this pin until ubuntu-24.04 runner/kernel or gateway behavior changes.
    runs-on: ubuntu-22.04
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.x"

      - name: Set up chart-testing
        uses: helm/chart-testing-action@6ec842c01de15ebb84c8627d2744a0c2f2755c9f # v2

      - name: Run chart-testing list-changed
        id: list-changed
        run: |
          changed="$(ct list-changed --config .github/ct.yaml)"
          if [[ -n "$changed" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            {
              echo "changed-charts<<EOF"
              echo "$changed"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Add dependency chart repos
        if: steps.list-changed.outputs.changed == 'true'
        run: |
          helm repo add dandydeveloper https://dandydeveloper.github.io/charts/
          helm repo update

      - name: Run chart-testing lint
        if: steps.list-changed.outputs.changed == 'true'
        run: ct lint --config .github/ct.yaml

      - name: Set up helm-unittest
        if: steps.list-changed.outputs.changed == 'true'
        run: helm plugin install https://github.com/helm-unittest/helm-unittest --version v1.1.1

      - name: Run helm-unittest
        id: helm-unittest
        if: steps.list-changed.outputs.changed == 'true'
        env:
          CHANGED_CHARTS: ${{ steps.list-changed.outputs.changed-charts }}
        run: |
          # helm unittest no-ops cleanly (exit 0, "0 passed, 0 total") on a
          # chart with no tests/*_test.yaml suites, so this runs unconditionally
          # per changed chart rather than needing to detect which ones have tests.
          while IFS= read -r chart; do
            helm unittest "$chart"
          done <<< "$CHANGED_CHARTS"

      - name: Create kind cluster
        if: steps.list-changed.outputs.changed == 'true'
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1

      - name: Prepare test environment
        if: steps.list-changed.outputs.changed == 'true'
        env:
          CHANGED_CHARTS: ${{ steps.list-changed.outputs.changed-charts }}
        run: |
          kubectl create namespace chart-testing --dry-run=client -o yaml | kubectl apply -f -
          while IFS= read -r chart; do
            chart_name=$(basename "$chart")
            fixture_dir=".github/chart-fixtures/${chart_name}"
            if [[ -d "$fixture_dir" ]]; then
              kubectl apply -f "$fixture_dir/" -n chart-testing
            fi
          done <<< "$CHANGED_CHARTS"

      - name: Run chart-testing install
        id: ct-install
        if: steps.list-changed.outputs.changed == 'true'
        run: ct install --config .github/ct.yaml --skip-clean-up

      - name: Dump chart-testing diagnostics
        if: failure() && steps.ct-install.outcome == 'failure'
        run: |
          echo "## Nodes"
          kubectl get nodes -o wide || true
          kubectl describe nodes || true

          echo "## Namespace resources"
          kubectl get all -n chart-testing -o wide || true

          echo "## Helm releases"
          helm list -n chart-testing --all || true

          echo "## Events"
          kubectl get events -n chart-testing --sort-by lastTimestamp -o wide || true

          echo "## Pod descriptions"
          kubectl describe pods -n chart-testing || true

          echo "## Container logs"
          for pod in $(kubectl get pods -n chart-testing -o jsonpath='{range .items[*]}{.metadata.name}{"\n"}{end}' || true); do
            for container in $(kubectl get pod "$pod" -n chart-testing -o jsonpath='{range .spec.containers[*]}{.name}{"\n"}{end}' || true); do
              echo "### ${pod}/${container} current logs"
              kubectl logs "$pod" -c "$container" -n chart-testing --tail=200 || true
              echo "### ${pod}/${container} previous logs"
              kubectl logs "$pod" -c "$container" -n chart-testing --previous --tail=200 || true
            done
          done

      - name: Clean chart-testing namespace
        if: always() && steps.list-changed.outputs.changed == 'true'
        run: |
          for release in $(helm list -n chart-testing --all --short); do
            helm uninstall "$release" -n chart-testing --wait --timeout 120s || true
          done
          kubectl delete all --all -n chart-testing --ignore-not-found=true || true

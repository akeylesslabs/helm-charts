{{ $ca := genCA "webhook-ca" 3650 }}
{{ $fullName := include "vault-secrets-webhook.fullname" . }}
{{ $cn := printf "%s.%s.svc" $fullName .Release.Namespace }}
{{ $cert := genSignedCert $cn nil (list $cn "") 365 $ca }}
{{ $mutatingWebhook := .Values.mutatingWebhook | default dict }}

apiVersion: v1
kind: List
metadata:
  name: {{ $fullName }}-webhook
items:

- apiVersion: v1
  kind: Secret
  metadata:
    name: {{ $fullName }}
    namespace: {{ .Release.Namespace }}
  data:
    tls.crt: {{ b64enc $cert.Cert }}
    tls.key: {{ b64enc $cert.Key }}
    ca.crt: {{ b64enc $ca.Cert }}

- apiVersion: admissionregistration.k8s.io/v1
  kind: MutatingWebhookConfiguration
  metadata:
    name: {{ $fullName }}
  webhooks:
  - name: pods.{{ $fullName }}.admission
    clientConfig:
      service:
        namespace: {{ .Release.Namespace }}
        name: {{ $fullName }}
        path: /pods
      caBundle: {{ b64enc $ca.Cert }}
    rules:
    - operations:
      - CREATE
      apiGroups:
      - "*"
      apiVersions:
      - "*"
      resources:
      - pods
    namespaceSelector:
      {{- $namespaceSelector := dig "namespaceSelector" dict $mutatingWebhook }}
      {{- tpl (toYaml $namespaceSelector) . | nindent 6 }}
    objectSelector:
      {{- $objectSelector := dig "objectSelector" dict $mutatingWebhook }}
      {{- tpl (toYaml $objectSelector) . | nindent 6 }}
    admissionReviewVersions: ["v1beta1"]
    sideEffects: None #Unknown
  {{- with dig "matchConditions" list $mutatingWebhook }}
    matchConditions:
      {{- tpl (toYaml .) $ | nindent 6 }}
  {{- end }}
{{- with omit $mutatingWebhook "name" "clientConfig" "rules" "namespaceSelector" "objectSelector" "matchConditions" "admissionReviewVersions" "sideEffects" }}
    {{- toYaml . | nindent 4 }}
{{- end }}

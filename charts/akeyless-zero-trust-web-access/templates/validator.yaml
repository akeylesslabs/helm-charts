{{- if .Values.validator.enabled }}
apiVersion: v1
kind: Pod
metadata:
  name: "{{ .Release.Name }}-validator"
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service | quote }}
    app.kubernetes.io/instance: {{ .Release.Name | quote }}
    app.kubernetes.io/version: {{ .Chart.AppVersion }}
    helm.sh/chart: "{{ .Chart.Name }}-{{ .Chart.Version }}"
  annotations:
  {{- if .Values.validator.annotations }}
    {{- toYaml .Values.validator.annotations | nindent 4 }}
  {{- end }}
    "helm.sh/hook": post-install
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
{{- with include "akeyless-zero-web-access.imagePullSecrets" (dict "Root" $ "initPullSecrets" (list) "imagePullSecrets" .Values.validator.image.imagePullSecrets) }}{{ . | nindent 2 }}{{ end }}
  containers:
    - name: post-install-job
      image: "{{ .Values.validator.image.repository}}:{{ .Values.validator.image.tag }}"
      imagePullPolicy: {{ .Values.validator.image.pullPolicy }}
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        runAsNonRoot: true
        allowPrivilegeEscalation: false
      {{- with .Values.validator.resources }}
      resources:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      command: ["/bin/sh"]
      args:
          - "-c"
          - |
            jq -nr 'env | .POLICY_CONFIG' > /tmp/policy_check
            jq -e . /tmp/policy_check || (echo "Policies JSON validation failed! please correct the policies JSON structure in the values.yaml file" && exit 1)
      env:
        - name: POLICY_CONFIG
          valueFrom:
            configMapKeyRef:
              name: {{ $.Release.Name }}-cm-web-policies
              key: policies.json           
  restartPolicy: Never
{{- end }}

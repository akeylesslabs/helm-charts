{{- $ga := .Values.gatewayAPI | default dict -}}
{{- if and $ga.enabled (($ga.gateway | default dict).create) -}}
{{- $gw := $ga.gateway -}}
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: {{ include "akeyless-api-gw.gatewayAPI.gatewayName" . }}
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "akeyless-api-gw.labels" . | nindent 4 }}
  {{- with $gw.labels }}
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with $gw.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  gatewayClassName: {{ required "akeyless-api-gateway: gatewayAPI.gateway.gatewayClassName is required when gatewayAPI.gateway.create=true (e.g. nginx, cilium, istio, kong, envoy)." $gw.gatewayClassName }}
  listeners:
  {{- if $gw.listeners }}
    {{- toYaml $gw.listeners | nindent 4 }}
  {{- else }}
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: {{ include "akeyless-api-gw.gatewayAPI.allowedRoutesFrom" . }}
    {{- $tls := $gw.tls | default dict }}
    {{- if $tls.enabled }}
    {{- if eq ($tls.mode | default "Terminate") "Passthrough" }}
    - name: tls
      protocol: TLS
      port: 443
      tls:
        mode: Passthrough
      allowedRoutes:
        namespaces:
          from: {{ include "akeyless-api-gw.gatewayAPI.allowedRoutesFrom" . }}
    {{- else }}
    - name: https
      protocol: HTTPS
      port: 443
      tls:
        mode: Terminate
        certificateRefs:
          {{- toYaml ($tls.certificateRefs | default list) | nindent 10 }}
      allowedRoutes:
        namespaces:
          from: {{ include "akeyless-api-gw.gatewayAPI.allowedRoutesFrom" . }}
    {{- end }}
    {{- end }}
  {{- end }}
{{- end -}}

suite: akeyless-gateway gatewayAPI guards
tests:
  - it: "G1 — gatewayAPI and the chart ingress are mutually exclusive"
    template: templates/gateway-api/gateway-api-validate.yaml
    set:
      gatewayAPI.enabled: true
      gatewayAPI.gateway.gatewayClassName: cilium
      gateway.ingress.enabled: true
    asserts:
      - failedTemplate:
          errorMessage: "akeyless-gateway gatewayAPI: gatewayAPI.enabled and gateway.ingress.enabled are mutually exclusive — enable exactly one north-south path."

  - it: "G2 — gatewayClassName required when create=true"
    template: templates/gateway-api/gateway.yaml
    set:
      gatewayAPI.enabled: true
      gatewayAPI.gateway.create: true
    asserts:
      - failedTemplate:
          errorMessage: "akeyless-gateway gatewayAPI: gateway.gatewayClassName is required when gateway.create=true (e.g. cilium, nginx, istio, kong, envoy, aws-alb)."

  - it: "G3 — parentRefs required when create=false"
    template: templates/gateway-api/gateway-api-validate.yaml
    set:
      gatewayAPI.enabled: true
      gatewayAPI.gateway.create: false
    asserts:
      - failedTemplate:
          errorMessage: "akeyless-gateway gatewayAPI: set parentRefs when gateway.create=false — there is no Gateway to attach routes to."

  - it: "G4 — tlsRoutes require a passthrough listener"
    template: templates/gateway-api/gateway-api-validate.yaml
    set:
      gatewayAPI.enabled: true
      gatewayAPI.gateway.gatewayClassName: cilium
      gatewayAPI.gateway.create: true
      gatewayAPI.tlsRoutes:
        - hostname: x.example.com
          servicePort: gateway
    asserts:
      - failedTemplate:
          errorMessage: "akeyless-gateway gatewayAPI: tlsRoutes require a TLS passthrough listener — set gatewayAPI.gateway.tls.enabled=true and tls.mode=Passthrough."

  - it: "G5 — unknown servicePort (lists the valid names)"
    template: templates/gateway-api/httproute.yaml
    set:
      gatewayAPI.enabled: true
      gatewayAPI.gateway.gatewayClassName: cilium
      gatewayAPI.httpRoutes:
        - hostname: x.example.com
          servicePort: nope
    asserts:
      - failedTemplate:
          errorMessage: 'akeyless-gateway gatewayAPI: route references unknown servicePort "nope"; valid names: gateway, kmip, hvp, ssh'

suite: akeyless-gateway gatewayAPI guards
tests:
  - it: "G1 — gatewayAPI and the chart ingress are mutually exclusive"
    template: templates/gateway-api/gateway-api-validate.yaml
    set:
      gatewayAPI.enabled: true
      gateway.ingress.enabled: true
    asserts:
      - failedTemplate:
          errorMessage: "akeyless-gateway gatewayAPI: gatewayAPI.enabled and gateway.ingress.enabled are mutually exclusive — enable exactly one north-south path."

  - it: "G2 — parentRefs required (httproute.yaml path)"
    template: templates/gateway-api/httproute.yaml
    set:
      gatewayAPI.enabled: true
      gatewayAPI.httpRoutes:
        - hostname: x.example.com
          servicePort: gateway
    asserts:
      - failedTemplate:
          errorMessage: "akeyless-gateway gatewayAPI: gatewayAPI.parentRefs is required — this slice attaches HTTPRoutes to an existing Gateway; it does not create one (Gateway creation is a separate, follow-on slice)."

  - it: "G3 — parentRefs required (gatewayApi.validate path)"
    template: templates/gateway-api/gateway-api-validate.yaml
    set:
      gatewayAPI.enabled: true
    asserts:
      - failedTemplate:
          errorMessage: "akeyless-gateway gatewayAPI: gatewayAPI.parentRefs is required — point at the existing Gateway to attach routes to (Gateway creation is a separate, follow-on slice)."

  - it: "G4 — unknown servicePort (lists the valid names)"
    template: templates/gateway-api/httproute.yaml
    set:
      gatewayAPI.enabled: true
      gatewayAPI.parentRefs:
        - name: shared-gw
      gatewayAPI.httpRoutes:
        - hostname: x.example.com
          servicePort: nope
    asserts:
      - failedTemplate:
          errorMessage: 'akeyless-gateway gatewayAPI: route references unknown servicePort "nope"; valid names: gateway'

  - it: "G5 — a quoted numeric servicePort still resolves (not misreported as unknown)"
    template: templates/gateway-api/httproute.yaml
    set:
      gatewayAPI.enabled: true
      gatewayAPI.parentRefs:
        - name: shared-gw
      gatewayAPI.backend.ports:
        - name: gateway
          port: "8000"
      gatewayAPI.httpRoutes:
        - hostname: x.example.com
          servicePort: gateway
    asserts:
      - equal:
          path: spec.rules[0].backendRefs[0].port
          value: 8000

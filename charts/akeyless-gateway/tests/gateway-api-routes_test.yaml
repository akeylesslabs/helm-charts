suite: akeyless-gateway gatewayAPI routes
set:
  gatewayAPI.enabled: true
  gatewayAPI.gateway.create: true
  gatewayAPI.gateway.gatewayClassName: cilium
tests:
  - it: HTTPRoute targets the gateway Service on the gateway port (8000)
    template: templates/gateway-api/httproute.yaml
    set:
      gatewayAPI.httpRoutes:
        - hostname: gw.example.com
          servicePort: gateway
    asserts:
      - isKind:
          of: HTTPRoute
      - equal:
          path: spec.rules[0].backendRefs[0].name
          value: RELEASE-NAME-akeyless-gateway
      - equal:
          path: spec.rules[0].backendRefs[0].port
          value: 8000
      - equal:
          path: spec.parentRefs[0].name
          value: RELEASE-NAME-akeyless-gateway

  - it: multiple httpRoutes get unique names
    template: templates/gateway-api/httproute.yaml
    set:
      gatewayAPI.httpRoutes:
        - hostname: a.example.com
          servicePort: gateway
        - hostname: b.example.com
          servicePort: gateway
    asserts:
      - hasDocuments:
          count: 2

  - it: KMIP TCPRoute (default backend, port 5696)
    template: templates/gateway-api/tcproute.yaml
    set:
      gatewayAPI.tcpRoutes:
        - name: kmip
          servicePort: kmip
    asserts:
      - isKind:
          of: TCPRoute
      - isAPIVersion:
          of: gateway.networking.k8s.io/v1alpha2
      - equal:
          path: spec.parentRefs[0].sectionName
          value: tcp-kmip
      - equal:
          path: spec.rules[0].backendRefs[0].name
          value: RELEASE-NAME-akeyless-gateway
      - equal:
          path: spec.rules[0].backendRefs[0].port
          value: 5696

  - it: HVP (HashiCorp Vault proxy) TCPRoute -> the gateway Service on the Vault port 8200
    template: templates/gateway-api/tcproute.yaml
    set:
      gatewayAPI.tcpRoutes:
        - name: hvp
          servicePort: hvp
    asserts:
      - isKind:
          of: TCPRoute
      - isAPIVersion:
          of: gateway.networking.k8s.io/v1alpha2
      - equal:
          path: spec.parentRefs[0].sectionName
          value: tcp-hvp
      - equal:
          path: spec.rules[0].backendRefs[0].name
          value: RELEASE-NAME-akeyless-gateway
      - equal:
          path: spec.rules[0].backendRefs[0].port
          value: 8200

  - it: SSH TCPRoute via serviceName override -> the separate SRA service on 22
    template: templates/gateway-api/tcproute.yaml
    set:
      gatewayAPI.tcpRoutes:
        - name: ssh
          servicePort: ssh
          serviceName: ssh-RELEASE-NAME-akeyless-gateway
    asserts:
      - equal:
          path: spec.rules[0].backendRefs[0].name
          value: ssh-RELEASE-NAME-akeyless-gateway
      - equal:
          path: spec.rules[0].backendRefs[0].port
          value: 22

  - it: TLSRoute passthrough
    template: templates/gateway-api/tlsroute.yaml
    set:
      gatewayAPI.gateway.tls.enabled: true
      gatewayAPI.gateway.tls.mode: Passthrough
      gatewayAPI.tlsRoutes:
        - hostname: secure.example.com
          servicePort: gateway
    asserts:
      - isKind:
          of: TLSRoute
      - equal:
          path: spec.parentRefs[0].sectionName
          value: tls
      - equal:
          path: spec.rules[0].backendRefs[0].port
          value: 8000

  - it: ReferenceGrant
    template: templates/gateway-api/referencegrant.yaml
    set:
      gatewayAPI.referenceGrants:
        - name: allow-gw
          from:
            - group: gateway.networking.k8s.io
              kind: HTTPRoute
              namespace: gateway
          to:
            - group: ""
              kind: Service
    asserts:
      - isKind:
          of: ReferenceGrant
      - isAPIVersion:
          of: gateway.networking.k8s.io/v1beta1

  - it: ReferenceGrant defaults the required core group when omitted (to[].group="")
    template: templates/gateway-api/referencegrant.yaml
    set:
      gatewayAPI.referenceGrants:
        - name: allow-core-service
          from:
            - group: gateway.networking.k8s.io
              kind: HTTPRoute
              namespace: gateway
          to:
            - kind: Service
    asserts:
      - equal:
          path: spec.to[0].group
          value: ""
      - equal:
          path: spec.to[0].kind
          value: Service

  - it: extraObjects renders a per-cloud policy CR (targetRef resolves to the gateway Service)
    template: templates/gateway-api/extra-objects.yaml
    set:
      gatewayAPI.extraObjects:
        - apiVersion: networking.gke.io/v1
          kind: HealthCheckPolicy
          metadata:
            name: hc
          spec:
            targetRef:
              group: ""
              kind: Service
              name: '{{ include "gatewayApi.backendService" . }}'
    asserts:
      - isKind:
          of: HealthCheckPolicy
      - equal:
          path: spec.targetRef.name
          value: RELEASE-NAME-akeyless-gateway

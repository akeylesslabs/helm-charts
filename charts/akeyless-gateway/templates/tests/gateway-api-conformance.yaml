{{- $ga := .Values.gatewayAPI | default dict -}}
{{- if $ga.enabled -}}
{{- $name := printf "%s-gwapi-conformance" (include "gatewayApi.backendService" .) -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $name }}
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "gatewayApi.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: test
    helm.sh/hook-weight: "-5"
    helm.sh/hook-delete-policy: before-hook-creation
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ $name }}
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "gatewayApi.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: test
    helm.sh/hook-weight: "-5"
    helm.sh/hook-delete-policy: before-hook-creation
rules:
  - apiGroups:
      - gateway.networking.k8s.io
    resources:
      - gateways
      - httproutes
    verbs:
      - get
      - list
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ $name }}
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "gatewayApi.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: test
    helm.sh/hook-weight: "-5"
    helm.sh/hook-delete-policy: before-hook-creation
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ $name }}
subjects:
  - kind: ServiceAccount
    name: {{ $name }}
    namespace: {{ .Release.Namespace | quote }}
---
apiVersion: v1
kind: Pod
metadata:
  name: {{ $name }}
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "gatewayApi.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: test
    helm.sh/hook-weight: "0"
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  serviceAccountName: {{ $name }}
  restartPolicy: Never
  containers:
    - name: conformance
      image: alpine/kubectl:1.34.1
      env:
        - name: NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
      command:
        - /bin/sh
        - -c
        - |
          set -eu
          if kubectl get gateways.gateway.networking.k8s.io -n "$NAMESPACE" -o name | grep -q . ; then
            kubectl wait --for=condition=Programmed gateways.gateway.networking.k8s.io --all -n "$NAMESPACE" --timeout=180s
          fi
          deadline=$(( $(date +%s) + 180 ))
          while : ; do
            routes=$(kubectl get httproutes.gateway.networking.k8s.io -n "$NAMESPACE" -o jsonpath='{range .items[*]}{.metadata.name}{"\n"}{end}')
            ready=1
            if [ -z "$routes" ] ; then
              ready=0
            fi
            for route in $routes ; do
              accepted=$(kubectl get httproutes.gateway.networking.k8s.io "$route" -n "$NAMESPACE" -o jsonpath='{.status.parents[*].conditions[?(@.type=="Accepted")].status}')
              resolved=$(kubectl get httproutes.gateway.networking.k8s.io "$route" -n "$NAMESPACE" -o jsonpath='{.status.parents[*].conditions[?(@.type=="ResolvedRefs")].status}')
              accepted_total=$(echo "$accepted" | wc -w)
              accepted_true=$(echo "$accepted" | tr ' ' '\n' | grep -c '^True$' || true)
              resolved_true=$(echo "$resolved" | tr ' ' '\n' | grep -c '^True$' || true)
              if [ "$accepted_total" -lt 1 ] || [ "$accepted_true" -ne "$accepted_total" ] || [ "$resolved_true" -ne "$accepted_total" ] ; then
                ready=0
              fi
            done
            if [ "$ready" -eq 1 ] ; then
              echo "gateways programmed and every httproute accepted with resolved refs"
              exit 0
            fi
            if [ "$(date +%s)" -ge "$deadline" ] ; then
              echo "timeout waiting for gateway-api conformance"
              kubectl get gateways.gateway.networking.k8s.io -n "$NAMESPACE" -o wide || true
              kubectl get httproutes.gateway.networking.k8s.io -n "$NAMESPACE" -o yaml || true
              exit 1
            fi
            sleep 6
          done
{{- end -}}

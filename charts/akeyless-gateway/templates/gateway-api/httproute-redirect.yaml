{{- $ga := .Values.gatewayAPI | default dict -}}
{{- $redirect := $ga.httpsRedirect | default dict -}}
{{- if and $ga.enabled $redirect.enabled -}}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "gatewayApi.backendService" . }}-https-redirect
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "gatewayApi.labels" . | nindent 4 }}
spec:
  parentRefs:
    {{- if $redirect.parentRefs }}
    {{- toYaml $redirect.parentRefs | nindent 4 }}
    {{- else }}
    {{- range (include "gatewayApi.parentRefs" . | fromYamlArray) }}
    - name: {{ .name }}
      sectionName: {{ $redirect.sectionName | default "http" }}
    {{- end }}
    {{- end }}
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301
{{- end -}}

{{- $ga := .Values.gatewayAPI | default dict -}}
{{- $gw := $ga.gateway | default dict -}}
{{- $tls := $gw.tls | default dict -}}
{{- if and $ga.enabled $gw.create $tls.enabled (eq ($tls.mode | default "Terminate") "Terminate") $tls.httpsRedirect -}}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "gatewayApi.gatewayName" . }}-https-redirect
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "gatewayApi.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ include "gatewayApi.gatewayName" . }}
      sectionName: http
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301
{{- end -}}

# Sample rendered manifest snippet showing strictSecurityPolicy applied
# Gateway Deployment excerpt
apiVersion: apps/v1
kind: Deployment
metadata:
  name: unified-test-release-akeyless-gateway
  namespace: default
spec:
  template:
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: akeyless-gateway
        image: "akeyless/gateway:latest"
        securityContext:
          runAsNonRoot: true
          runAsUser: 1001
          runAsGroup: 1001
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
          readOnlyRootFilesystem: false
        resources:
          requests:
            cpu: "1"
            memory: "2G"
          limits:
            cpu: "2"
            memory: "4G"
---
